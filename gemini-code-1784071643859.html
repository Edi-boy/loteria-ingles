<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería: English Opinion Phrases</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f0f8ff; 
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p.subtitle {
            color: #555;
            margin-bottom: 20px;
        }
        .controls { 
            margin-bottom: 20px; 
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button.griton-btn { background-color: #e74c3c; }
        button.griton-btn:hover { background-color: #c0392b; }
        
        #current-card-container {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        #current-card-emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        #current-card-text { 
            font-size: 24px; 
            font-weight: bold; 
            color: #2c3e50; 
        }

        .board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            justify-content: center; 
            max-width: 600px;
            margin: 0 auto; 
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        
        .card { 
            aspect-ratio: 3/4; 
            border: 2px solid #bdc3c7; 
            border-radius: 8px;
            background: #ecf0f1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            cursor: pointer; 
            position: relative; 
            text-align: center; 
            padding: 8px; 
            box-sizing: border-box;
            user-select: none;
            transition: transform 0.1s;
        }
        
        .card:active {
            transform: scale(0.95);
        }

        .card-emoji {
            font-size: 35px;
            margin-bottom: 8px;
        }

        .card-text {
            font-size: 14px;
            font-weight: bold;
            color: #34495e;
            line-height: 1.2;
        }
        
        /* El frijolito virtual */
        .bean { 
            position: absolute; 
            width: 35px; 
            height: 45px; 
            background: radial-gradient(circle at 10px 10px, #a0522d, #5c3317); 
            border-radius: 50%; 
            display: none; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transform: rotate(20deg);
            z-index: 2;
        }
        .marked .bean { display: block; }
        
        /* Efecto visual al marcar */
        .marked {
            opacity: 0.8;
            background: #e0e0e0;
        }

    </style>
</head>
<body>

    <h1>Opinion Phrases Lotería</h1>
    <p class="subtitle">Aprende y juega con frases introductorias en inglés</p>
    
    <div class="controls">
        <button onclick="generateBoard()">Generar Mi Tabla</button>
        <button class="griton-btn" onclick="drawCard()">Cantar Carta (Gritón)</button>
        <button onclick="resetGame()" style="background-color: #95a5a6;">Reiniciar Mazo</button>
    </div>
    
    <div id="current-card-container">
        <div id="current-card-emoji">🎲</div>
        <div id="current-card-text">Da clic en "Cantar Carta" para empezar</div>
    </div>

    <div class="board" id="board"></div>

    <script>
        // Lista de frases de opinión en inglés con emojis ilustrativos
        const phrasesDB = [
            { id: 1, text: "In my opinion", emoji: "🗣️" },
            { id: 2, text: "I think that", emoji: "🤔" },
            { id: 3, text: "I believe that", emoji: "✨" },
            { id: 4, text: "From my point of view", emoji: "👁️" },
            { id: 5, text: "As far as I'm concerned", emoji: "🤷" },
            { id: 6, text: "To my mind", emoji: "🧠" },
            { id: 7, text: "It seems to me that", emoji: "👀" },
            { id: 8, text: "I strongly believe", emoji: "💪" },
            { id: 9, text: "Personally, I think", emoji: "🙋" },
            { id: 10, text: "If you ask me", emoji: "💬" },
            { id: 11, text: "To be honest", emoji: "😇" },
            { id: 12, text: "I honestly think", emoji: "💯" },
            { id: 13, text: "As I see it", emoji: "👓" },
            { id: 14, text: "I would say that", emoji: "🎙️" },
            { id: 15, text: "It is my belief that", emoji: "🏛️" },
            { id: 16, text: "I feel that", emoji: "❤️" },
            { id: 17, text: "Without a doubt", emoji: "✅" },
            { id: 18, text: "I'm convinced that", emoji: "🔒" },
            { id: 19, text: "My perspective is", emoji: "🖼️" },
            { id: 20, text: "In my experience", emoji: "🛠️" },
            { id: 21, text: "Speaking for myself", emoji: "🎤" },
            { id: 22, text: "I tend to think", emoji: "📈" },
            { id: 23, text: "I am sure that", emoji: "🎯" },
            { id: 24, text: "I guess that", emoji: "🤷‍♂️" }
        ];

        let deck = [];

        // Función para mezclar un arreglo (algoritmo Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Prepara el mazo del gritón
        function resetGame() {
            deck = shuffle([...phrasesDB]);
            document.getElementById('current-card-emoji').textContent = "🎲";
            document.getElementById('current-card-text').textContent = "Mazo mezclado. ¡Listos para cantar!";
        }

        // Generar una tabla de 16 cartas (4x4)
        function generateBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = ''; // Limpiar tabla actual
            
            // Seleccionar 16 cartas al azar para la tabla
            const shuffledForBoard = shuffle([...phrasesDB]);
            const boardCards = shuffledForBoard.slice(0, 16);

            boardCards.forEach(cardData => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                
                // Añadir el emoji
                const emojiDiv = document.createElement('div');
                emojiDiv.className = 'card-emoji';
                emojiDiv.textContent = cardData.emoji;
                
                // Añadir el texto
                const textDiv = document.createElement('div');
                textDiv.className = 'card-text';
                textDiv.textContent = cardData.text;

                // Añadir el "frijolito"
                const beanDiv = document.createElement('div');
                beanDiv.className = 'bean';

                cardDiv.appendChild(emojiDiv);
                cardDiv.appendChild(textDiv);
                cardDiv.appendChild(beanDiv);

                // Evento para poner o quitar el frijolito al hacer clic
                cardDiv.addEventListener('click', () => {
                    cardDiv.classList.toggle('marked');
                });

                boardElement.appendChild(cardDiv);
            });
        }

        // Sacar carta del mazo (El Gritón)
        function drawCard() {
            if (deck.length === 0) {
                document.getElementById('current-card-emoji').textContent = "🛑";
                document.getElementById('current-card-text').textContent = "¡Se acabaron las cartas! Reinicia el mazo.";
                return;
            }

            const card = deck.pop();
            document.getElementById('current-card-emoji').textContent = card.emoji;
            document.getElementById('current-card-text').textContent = card.text;
        }

        // Inicializar al cargar la página
        window.onload = () => {
            resetGame();
            generateBoard();
        };
    </script>
</body>
</html>
